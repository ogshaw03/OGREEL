<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimRef — 動画素材管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
  --border:#2a2a2f;--border2:#3a3a42;
  --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
  --accent:#7c6fff;--accent2:#5a4fff;
  --red:#ff5a5a;--green:#5affa0;--amber:#ffb85a;
  --radius:10px;--radius2:6px;
  --font-head:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;height:100vh}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,textarea,select{font-family:var(--font-body);color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:8px 12px;outline:none;font-size:13px}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
.header{display:flex;align-items:center;gap:16px;padding:0 16px;height:52px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:100}
.logo{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text);letter-spacing:2px}
.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:400px;position:relative}
.search-wrap input{width:100%;padding-left:32px;background:var(--bg3)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius2);font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-icon{width:32px;height:32px;border-radius:var(--radius2);display:flex;align-items:center;justify-content:center;font-size:15px}
.btn-icon:hover{background:var(--bg4)}
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 8px}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius2);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text)}
.nav-item .ni-icon{font-size:15px;width:18px;text-align:center}
.nav-item .badge{margin-left:auto;background:var(--bg4);border:1px solid var(--border);border-radius:10px;font-size:10px;padding:1px 6px;color:var(--text3)}
.nav-item.active .badge{background:var(--accent);border-color:var(--accent);color:#fff}
.folder-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--radius2);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.folder-item:hover{background:var(--bg4);color:var(--text)}
.folder-item.active{color:var(--accent)}
.folder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.new-folder-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:12px;color:var(--text3);cursor:pointer;border-radius:var(--radius2);width:100%}
.new-folder-btn:hover{color:var(--text2)}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid transparent;margin:2px;transition:all .15s;background:var(--bg4);color:var(--text2)}
.tag-chip:hover{opacity:.8}
.tag-chip.active{border-color:var(--accent);color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1}
.sort-select{border:1px solid var(--border);background:var(--bg3);padding:5px 8px;border-radius:var(--radius2);font-size:12px;color:var(--text2)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden}
.view-btn{width:30px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);background:var(--bg3);transition:all .15s}
.view-btn.active,.view-btn:hover{background:var(--bg4);color:var(--text)}
.count-badge{font-size:12px;color:var(--text3)}
.grid-wrap{flex:1;overflow-y:auto;padding:16px}
.video-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.video-grid.list-view{grid-template-columns:1fr}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative}
.vcard:hover{border-color:var(--border2)}
.vcard-thumb-wrap{position:relative;padding-bottom:56.25%;background:#111;overflow:hidden}
.vcard-thumb-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vcard-thumb-no-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:32px}
.vcard-badge{position:absolute;top:8px;left:8px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:.5px;z-index:2}
.badge-yt{background:#ff0000;color:#fff}
.badge-vm{background:#1ab7ea;color:#fff}
.badge-nc{background:#666;color:#fff}
.badge-x{background:#000;color:#fff}
.vcard-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:3}
.vcard:hover .vcard-actions{opacity:1}
.vcard-act-btn{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .15s}
.vcard-act-btn:hover{background:rgba(255,255,255,.15)}
.vcard-body{padding:10px 12px}
.vcard-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vcard-meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.vcard-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.vcard-tag{padding:2px 6px;border-radius:10px;font-size:10px;background:var(--bg4);color:var(--text2)}
.vcard-note{font-size:11px;color:var(--text3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-grid.list-view .vcard{display:flex;flex-direction:row}
.video-grid.list-view .vcard-thumb-wrap{width:180px;flex-shrink:0;padding-bottom:0;height:101px}
.video-grid.list-view .vcard-body{flex:1;display:flex;flex-direction:column;justify-content:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
.modal-bg.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.modal-body{padding:20px}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-input{width:100%}
.form-row textarea.form-input{height:70px;resize:vertical}
.url-parse-row{display:flex;gap:8px}
.url-parse-row input{flex:1}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.player-info{padding:16px 20px}
.player-title{font-family:var(--font-head);font-size:17px;font-weight:700;margin-bottom:8px}
.player-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3);margin-bottom:10px;flex-wrap:wrap}
.player-note{background:var(--bg3);border-radius:var(--radius2);padding:10px 12px;font-size:13px;color:var(--text2);margin-bottom:10px}
.player-tags{display:flex;gap:6px;flex-wrap:wrap}
.tags-input-wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center;border:1px solid var(--border);border-radius:var(--radius2);padding:4px 6px;min-height:36px;cursor:text}
.tags-input-wrap:focus-within{border-color:var(--accent)}
.tags-input-wrap input{border:none;background:none;padding:2px 4px;outline:none;font-size:13px;min-width:80px;flex:1}
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;background:var(--bg4);border:1px solid var(--border)}
.tag-pill button{font-size:11px;color:var(--text3)}
.tag-pill button:hover{color:var(--red)}
.color-picker{display:flex;gap:6px;flex-wrap:wrap}
.color-opt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.1s}
.color-opt.selected,.color-opt:hover{border-color:#fff}
.notification{position:fixed;bottom:24px;right:24px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:13px;z-index:9999;animation:slideIn .2s ease;pointer-events:none}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:300px;color:var(--text3);padding:60px;grid-column:1/-1}
.empty-icon{font-size:48px}
.empty-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text2)}
.empty-desc{font-size:13px;text-align:center;line-height:1.6}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.loading-overlay.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
.user-badge{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text3)">接続中...</div>
</div>

<div class="header">
  <div class="logo">ANIM<span>REF</span></div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="タイトル・タグで検索...">
  </div>
  <div class="header-actions">
    <span class="sync-dot" id="syncDot" title="リアルタイム同期中"></span>
    <span class="user-badge" id="userBadge">-</span>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
  </div>
</div>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">ライブラリ</div>
      <div class="nav-item active" onclick="setFilter('all',this)"><span class="ni-icon">📁</span>すべて<span class="badge" id="badge-all">0</span></div>
      <div class="nav-item" onclick="setFilter('fav',this)"><span class="ni-icon">⭐</span>お気に入り<span class="badge" id="badge-fav">0</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">プラットフォーム</div>
      <div class="nav-item" onclick="setFilter('yt',this)"><span class="ni-icon">▶️</span>YouTube<span class="badge" id="badge-yt">0</span></div>
      <div class="nav-item" onclick="setFilter('vm',this)"><span class="ni-icon">🎬</span>Vimeo<span class="badge" id="badge-vm">0</span></div>
      <div class="nav-item" onclick="setFilter('nc',this)"><span class="ni-icon">🎴</span>ニコニコ<span class="badge" id="badge-nc">0</span></div>
      <div class="nav-item" onclick="setFilter('x',this)"><span class="ni-icon">✖️</span>X (Twitter)<span class="badge" id="badge-x">0</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">フォルダ</div>
      <div id="folderList"></div>
      <button class="new-folder-btn" onclick="openFolderModal()">＋ 新しいフォルダ</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">タグ</div>
      <div id="tagList" style="padding:2px 4px"></div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="count-badge" id="countLabel">0件</span>
        <select class="sort-select" id="sortSelect" onchange="renderGrid()">
          <option value="newest">新しい順</option>
          <option value="oldest">古い順</option>
          <option value="alpha">名前順</option>
        </select>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="グリッド">⊞</button>
        <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="リスト">≡</button>
      </div>
    </div>
    <div class="grid-wrap"><div class="video-grid" id="videoGrid"></div></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg hidden" id="addModal" onclick="closeModalBg(event,'addModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">動画を追加</div>
      <button class="btn-icon" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">URL *</label>
        <div class="url-parse-row">
          <input type="url" class="form-input" id="videoUrl" placeholder="YouTube / Vimeo / ニコニコ / X のURL">
          <button class="btn btn-ghost" onclick="parseUrl()">取得</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-input" id="videoTitle" placeholder="タイトル（省略可）">
      </div>
      <div class="form-row">
        <label class="form-label">フォルダ</label>
        <select class="form-input" id="videoFolder"><option value="">なし</option></select>
      </div>
      <div class="form-row">
        <label class="form-label">タグ（Enterで追加）</label>
        <div class="tags-input-wrap" id="tagsInputWrap">
          <input type="text" id="tagInput" placeholder="タグを入力..." onkeydown="handleTagInput(event)">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">メモ</label>
        <textarea class="form-input" id="videoNote" placeholder="自由にメモ..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveVideo()">保存</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg hidden" id="playerModal" onclick="closeModalBg(event,'playerModal')">
  <div class="modal">
    <div class="player-info">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="player-title" id="playerTitle"></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="editCurrent()">✏️ 編集</button>
          <button class="btn-icon" onclick="closeModal('playerModal')" style="font-size:16px">✕</button>
        </div>
      </div>
      <div class="player-meta" id="playerMeta"></div>
      <div class="player-note" id="playerNote" style="display:none"></div>
      <div class="player-tags" id="playerTags"></div>
      <div style="margin-top:14px">
        <button class="btn btn-primary" id="openUrlBtn" style="width:100%;justify-content:center" onclick="openCurrentUrl()">▶ 動画を開く（新しいタブ）</button>
      </div>
    </div>
  </div>
</div>

<!-- FOLDER MODAL -->
<div class="modal-bg hidden" id="folderModal" onclick="closeModalBg(event,'folderModal')">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title">フォルダを作成</div>
      <button class="btn-icon" onclick="closeModal('folderModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">フォルダ名</label>
        <input type="text" class="form-input" id="folderName" placeholder="フォルダ名">
      </div>
      <div class="form-row">
        <label class="form-label">カラー</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('folderModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveFolder()">作成</button>
    </div>
  </div>
</div>

<div id="notification" style="display:none" class="notification"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyASqL2Qp8sGrkzHz7J_HhE6QXntAZOO7RE",
  authDomain: "animref-ef532.firebaseapp.com",
  projectId: "animref-ef532",
  storageBucket: "animref-ef532.firebasestorage.app",
  messagingSenderId: "1029274074603",
  appId: "1:1029274074603:web:f0ddc3eb69e35a47276dae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const COLORS=['purple','blue','green','amber','red','pink','gray'];
const COLOR_HEX={purple:'#7c6fff',blue:'#5a8fff',green:'#5affa0',amber:'#ffb85a',red:'#ff5a5a',pink:'#ff5aaa',gray:'#5a5a6a'};

let videos=[], folders=[];
let state={filter:'all',folder:null,tag:null,view:'grid',editId:null,currentTags:[],selectedColor:'purple',currentPlayId:null};
let currentUid=null;

// ── Auth ──
onAuthStateChanged(auth, user => {
  if(user){
    currentUid=user.uid;
    const shortId=user.uid.slice(0,6);
    document.getElementById('userBadge').textContent='ID: '+shortId;
    startListeners();
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
});
signInAnonymously(auth).catch(e=>{ notify('接続エラー: '+e.message); });

// ── Realtime Listeners ──
function startListeners(){
  onSnapshot(query(collection(db,'videos'),orderBy('createdAt','desc')), snap=>{
    videos=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });
  onSnapshot(collection(db,'folders'), snap=>{
    folders=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });
}

// ── Helpers ──
function notify(msg){const n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',2200)}
function detectPlatform(url){
  if(!url)return'other';
  if(/youtube\.com|youtu\.be/.test(url))return'yt';
  if(/vimeo\.com/.test(url))return'vm';
  if(/nicovideo\.jp|nico\.ms/.test(url))return'nc';
  if(/twitter\.com|x\.com/.test(url))return'x';
  return'other';
}
function getYtId(url){const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null}
function getVmId(url){const m=url.match(/vimeo\.com\/(\d+)/);return m?m[1]:null}
function getNcId(url){const m=url.match(/\/watch\/((?:sm|nm)\d+)/);return m?m[1]:null}
function getThumb(v){
  if(v.platform==='yt'&&v.vid)return`https://img.youtube.com/vi/${v.vid}/mqdefault.jpg`;
  if(v.platform==='vm'&&v.thumb)return v.thumb;
  return'';
}
function platformLabel(p){return{yt:'YouTube',vm:'Vimeo',nc:'ニコニコ',x:'X'}[p]||'OTHER'}
function platformClass(p){return'badge-'+(p||'yt')}

// ── Parse URL ──
window.parseUrl=async function(){
  const url=document.getElementById('videoUrl').value.trim();
  if(!url)return;
  const p=detectPlatform(url);
  const ti=document.getElementById('videoTitle');
  if(p==='yt'){if(!ti.value)ti.value='(YouTube動画)'}
  else if(p==='vm'){
    try{
      const r=await fetch(`https://vimeo.com/api/oembed.json?url=${encodeURIComponent(url)}`);
      const d=await r.json();
      if(!ti.value)ti.value=d.title||'';
      document.getElementById('videoUrl').dataset.vimeoThumb=d.thumbnail_url||'';
    }catch(e){}
  }else if(p==='nc'){if(!ti.value)ti.value='(ニコニコ動画)'}
  else if(p==='x'){if(!ti.value)ti.value='(X投稿)'}
  notify('URL解析完了');
}

// ── Add Modal ──
window.openAddModal=function(id=null){
  state.editId=id; state.currentTags=[];
  const v=id?videos.find(x=>x.id===id):null;
  document.getElementById('modalTitle').textContent=v?'動画を編集':'動画を追加';
  document.getElementById('videoUrl').value=v?v.url:'';
  document.getElementById('videoTitle').value=v?v.title:'';
  document.getElementById('videoNote').value=v?v.note||'':'';
  if(v&&v.tags)state.currentTags=[...v.tags];
  renderTagPills();
  populateFolderSelect(v?v.folder||'':'');
  document.getElementById('addModal').classList.remove('hidden');
}

function populateFolderSelect(sel=''){
  const s=document.getElementById('videoFolder');
  s.innerHTML='<option value="">なし</option>';
  folders.forEach(f=>{
    const o=document.createElement('option');
    o.value=f.id; o.textContent=f.name;
    if(f.id===sel)o.selected=true;
    s.appendChild(o);
  });
}

window.handleTagInput=function(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim().replace(',','');
    if(v&&!state.currentTags.includes(v)){state.currentTags.push(v);renderTagPills()}
    e.target.value='';
  }
}

function renderTagPills(){
  const wrap=document.getElementById('tagsInputWrap');
  wrap.querySelectorAll('.tag-pill').forEach(x=>x.remove());
  const inp=document.getElementById('tagInput');
  state.currentTags.forEach(t=>{
    const p=document.createElement('span');
    p.className='tag-pill';
    p.innerHTML=`${t}<button onclick="removeTag('${t}')">✕</button>`;
    wrap.insertBefore(p,inp);
  });
}
window.removeTag=function(t){state.currentTags=state.currentTags.filter(x=>x!==t);renderTagPills()}

// ── Save Video ──
window.saveVideo=async function(){
  const url=document.getElementById('videoUrl').value.trim();
  if(!url){notify('URLを入力してください');return}
  const p=detectPlatform(url);
  const vid=p==='yt'?getYtId(url):p==='vm'?getVmId(url):p==='nc'?getNcId(url):null;
  const title=document.getElementById('videoTitle').value.trim()||(platformLabel(p)+' 動画');
  const folder=document.getElementById('videoFolder').value;
  const note=document.getElementById('videoNote').value.trim();
  const thumb=p==='vm'?document.getElementById('videoUrl').dataset.vimeoThumb||'':'';
  const data={url,vid:vid||null,platform:p,title,tags:state.currentTags,folder,note,thumb,fav:false,createdAt:Date.now(),addedBy:currentUid};
  try{
    if(state.editId){
      const existing=videos.find(x=>x.id===state.editId);
      await updateDoc(doc(db,'videos',state.editId),{...data,fav:existing?existing.fav:false,addedBy:existing?existing.addedBy:currentUid});
    }else{
      await addDoc(collection(db,'videos'),data);
    }
    closeModal('addModal');notify('保存しました');
  }catch(e){notify('保存失敗: '+e.message)}
}

// ── Delete / Fav ──
window.deleteVideo=async function(id){
  if(!confirm('削除しますか？'))return;
  try{await deleteDoc(doc(db,'videos',id));notify('削除しました')}
  catch(e){notify('削除失敗')}
}
window.toggleFav=async function(id){
  const v=videos.find(x=>x.id===id);if(!v)return;
  try{
    await updateDoc(doc(db,'videos',id),{fav:!v.fav});
    notify(!v.fav?'お気に入りに追加':'お気に入りから削除');
  }catch(e){notify('更新失敗')}
}

// ── Player ──
window.openPlayer=function(id){
  const v=videos.find(x=>x.id===id);if(!v)return;
  state.currentPlayId=id;
  document.getElementById('playerTitle').textContent=v.title;
  const folder=v.folder?folders.find(f=>f.id===v.folder):null;
  document.getElementById('playerMeta').innerHTML=
    `<span class="vcard-badge ${platformClass(v.platform)}" style="position:static">${platformLabel(v.platform)}</span>`+
    (folder?`<span>📁 ${folder.name}</span>`:'');
  const ni=document.getElementById('playerNote');
  if(v.note){ni.textContent=v.note;ni.style.display='block'}else{ni.style.display='none'}
  document.getElementById('playerTags').innerHTML=v.tags.map(t=>`<span class="vcard-tag">${t}</span>`).join('');
  document.getElementById('playerModal').classList.remove('hidden');
}
window.openCurrentUrl=function(){
  const v=videos.find(x=>x.id===state.currentPlayId);
  if(v)window.open(v.url,'_blank');
}
window.editCurrent=function(){closeModal('playerModal');openAddModal(state.currentPlayId)}

// ── Filter / View ──
window.setFilter=function(f,el){
  state.filter=f;state.folder=null;state.tag=null;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.folder-item').forEach(x=>x.classList.remove('active'));
  renderGrid();
}
window.setFolder=function(id){
  state.folder=id;state.filter=null;state.tag=null;
  document.querySelectorAll('.nav-item,.folder-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.folder-item').forEach(x=>{if(x.dataset.id===id)x.classList.add('active')});
  renderGrid();
}
window.setTagFilter=function(t){
  state.tag=t;state.filter=null;state.folder=null;
  document.querySelectorAll('.nav-item,.folder-item').forEach(x=>x.classList.remove('active'));
  renderGrid();
}
window.setView=function(v){
  state.view=v;
  document.getElementById('gridViewBtn').classList.toggle('active',v==='grid');
  document.getElementById('listViewBtn').classList.toggle('active',v==='list');
  document.getElementById('videoGrid').classList.toggle('list-view',v==='list');
}

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return videos.filter(v=>{
    if(state.folder&&v.folder!==state.folder)return false;
    if(state.tag&&!v.tags.includes(state.tag))return false;
    if(state.filter==='fav'&&!v.fav)return false;
    if(['yt','vm','nc','x'].includes(state.filter)&&v.platform!==state.filter)return false;
    if(q&&!v.title.toLowerCase().includes(q)&&!(v.tags||[]).join(' ').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    const s=document.getElementById('sortSelect').value;
    if(s==='newest')return b.createdAt-a.createdAt;
    if(s==='oldest')return a.createdAt-b.createdAt;
    return a.title.localeCompare(b.title,'ja');
  });
}

// ── Render Grid ──
function renderGrid(){
  const list=getFiltered();
  const g=document.getElementById('videoGrid');
  document.getElementById('countLabel').textContent=`${list.length}件`;
  g.innerHTML='';
  if(!list.length){
    g.innerHTML=`<div class="empty-state"><div class="empty-icon">🎞️</div><div class="empty-title">動画がありません</div><div class="empty-desc">「＋ 追加」ボタンから動画URLを登録してください</div></div>`;
    return;
  }
  list.forEach(v=>{
    const thumb=getThumb(v);
    const folderName=v.folder?folders.find(f=>f.id===v.folder)?.name||'':'';
    const card=document.createElement('div');
    card.className='vcard';
    card.innerHTML=`
      <div class="vcard-thumb-wrap">
        ${thumb?`<img src="${thumb}" alt="" loading="lazy">`:`<div class="vcard-thumb-no-img">▶</div>`}
        <span class="vcard-badge ${platformClass(v.platform)}">${platformLabel(v.platform)}</span>
        <div class="vcard-actions">
          <button class="vcard-act-btn" onclick="event.stopPropagation();toggleFav('${v.id}')" title="${v.fav?'お気に入り解除':'お気に入り'}">${v.fav?'⭐':'☆'}</button>
          <button class="vcard-act-btn" onclick="event.stopPropagation();openAddModal('${v.id}')" title="編集">✏️</button>
          <button class="vcard-act-btn" onclick="event.stopPropagation();deleteVideo('${v.id}')" title="削除">🗑️</button>
        </div>
      </div>
      <div class="vcard-body">
        <div class="vcard-title">${v.title||'無題'}</div>
        ${folderName?`<div class="vcard-meta">📁 ${folderName}</div>`:''}
        ${v.tags&&v.tags.length?`<div class="vcard-tags">${v.tags.map(t=>`<span class="vcard-tag">${t}</span>`).join('')}</div>`:''}
        ${v.note?`<div class="vcard-note">📝 ${v.note}</div>`:''}
      </div>`;
    card.addEventListener('click',()=>openPlayer(v.id));
    g.appendChild(card);
  });
}

// ── Render Sidebar ──
function renderSidebar(){
  document.getElementById('badge-all').textContent=videos.length;
  document.getElementById('badge-fav').textContent=videos.filter(v=>v.fav).length;
  ['yt','vm','nc','x'].forEach(p=>{ document.getElementById('badge-'+p).textContent=videos.filter(v=>v.platform===p).length });
  const fl=document.getElementById('folderList');
  fl.innerHTML='';
  folders.forEach(f=>{
    const el=document.createElement('div');
    el.className='folder-item'; el.dataset.id=f.id;
    el.innerHTML=`<span class="folder-dot" style="background:${COLOR_HEX[f.color]||'#7c6fff'}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><span style="font-size:10px;color:var(--text3)">${videos.filter(v=>v.folder===f.id).length}</span>`;
    el.addEventListener('click',()=>setFolder(f.id));
    fl.appendChild(el);
  });
  const tl=document.getElementById('tagList');
  tl.innerHTML='';
  const allTags=[...new Set(videos.flatMap(v=>v.tags||[]))];
  allTags.forEach(t=>{
    const c=document.createElement('span');
    c.className='tag-chip'+(state.tag===t?' active':'');
    c.textContent=t;
    c.onclick=()=>setTagFilter(t);
    tl.appendChild(c);
  });
}

function renderAll(){renderSidebar();renderGrid()}

// ── Folder ──
window.openFolderModal=function(){
  document.getElementById('folderName').value='';
  state.selectedColor='purple';
  renderColorPicker();
  document.getElementById('folderModal').classList.remove('hidden');
}
function renderColorPicker(){
  const cp=document.getElementById('colorPicker');
  cp.innerHTML='';
  COLORS.forEach(c=>{
    const el=document.createElement('div');
    el.className='color-opt'+(state.selectedColor===c?' selected':'');
    el.style.background=COLOR_HEX[c];
    el.onclick=()=>{state.selectedColor=c;renderColorPicker()};
    cp.appendChild(el);
  });
}
window.saveFolder=async function(){
  const name=document.getElementById('folderName').value.trim();
  if(!name){notify('フォルダ名を入力してください');return}
  try{
    await addDoc(collection(db,'folders'),{name,color:state.selectedColor,createdAt:Date.now()});
    closeModal('folderModal');notify('フォルダを作成しました');
  }catch(e){notify('作成失敗: '+e.message)}
}

// ── Modal ──
window.closeModal=function(id){document.getElementById(id).classList.add('hidden')}
window.closeModalBg=function(e,id){if(e.target.classList.contains('modal-bg'))closeModal(id)}

document.getElementById('searchInput').addEventListener('input',renderGrid);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')['playerModal','addModal','folderModal'].forEach(id=>{
    if(!document.getElementById(id).classList.contains('hidden'))closeModal(id);
  });
});
</script>
</body>
</html>
